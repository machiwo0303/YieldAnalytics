name: Run JPX Screening Fetch

on:
  workflow_dispatch:  
  push:
  schedule:
    - cron: "0 7 1 * *"   # 毎月1日 7:00 UTC（JST 16:00）

jobs:
  run-fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run jpx_screening_fetch.py
        run: |
          python jpx_screening_fetch.py input/topix_core30.csv

      - name: Commit latest CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          mv output_financial_dividend_merged.csv data/output_financial_dividend_merged.csv
          git add data/output_financial_dividend_merged.csv
          git commit -m "Update fetch output (auto)"
          git push