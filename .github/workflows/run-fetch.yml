name: Run JPX Screening Fetch

on:
  workflow_dispatch:
  push:  

jobs:
  run-fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run jpx_screening_fetch.py
        run: |
          python jpx_screening_fetch.py input/jpx_all.csv

      - name: Upload output CSV
        uses: actions/upload-artifact@v4
        with:
          name: output_financial_dividend_merged
          path: output_financial_dividend_merged.csv
